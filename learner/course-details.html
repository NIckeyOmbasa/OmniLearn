<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Course Details - OmniLearn</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="learner.css" />
  <style>
    .course-details-container {
      max-width: 900px;
      margin: 100px auto 40px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(76,109,219,0.10);
      padding: 40px 32px;
      font-family: 'Montserrat', Arial, sans-serif;
    }
    .course-banner {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 32px;
    }
    .course-banner-image {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
      background: #e6eefd;
    }
    .course-banner-info {
      flex: 1;
    }
    .course-title {
      color: #4c6ddb;
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .course-description {
      color: #263a7a;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .course-meta {
      color: #7ebe91;
      font-size: 0.98rem;
      margin-bottom: 8px;
    }
    .course-progress-bar-bg {
      background: #e6eefd;
      border-radius: 8px;
      height: 18px;
      width: 100%;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .course-progress-bar-fill {
      background: #4c6ddb;
      height: 100%;
      border-radius: 8px;
      transition: width 0.3s;
    }
    .topic-item {
      background: #f7f9fb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border-left: 4px solid #4c6ddb;
    }
    .topic-title {
      color: #263a7a;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .topic-content {
      color: #263a7a;
      line-height: 1.6;
      margin-bottom: 15px;
      display: none;
    }
    .topic-item.open .topic-content {
      display: block;
    }
    .subtopic-item {
      background: #fff;
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0 10px 20px;
      border-left: 3px solid #7ebe91;
    }
    .subtopic-title {
      color: #4c6ddb;
      font-weight: 600;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .subtopic-content {
      color: #263a7a;
      line-height: 1.5;
      display: none;
    }
    .subtopic-item.open .subtopic-content {
      display: block;
    }
    .video-section {
      margin: 18px 0 18px 0;
      padding: 12px 0;
      border-top: 1px solid #e6eefd;
      border-bottom: 1px solid #e6eefd;
      background: #f7f9fb;
      border-radius: 8px;
      text-align: center;
    }
    .video-section iframe {
      width: 100%;
      max-width: 560px;
      height: 315px;
      border-radius: 8px;
      margin: 0 auto;
      display: block;
    }
    .links-section {
      margin: 18px 0 18px 0;
      padding: 12px 0;
      border-top: 1px solid #e6eefd;
      background: #f7f9fb;
      border-radius: 8px;
    }
    .links-section ul {
      padding-left: 20px;
    }
    .back-btn {
      background: #7ebe91;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 18px;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:hover {
      background: #4c6ddb;
    }
  </style>
</head>
<body>
  <div class="dashboard-header">
    <a href="index.html" class="header-logo">
      <img src="../logo.svg" alt="OmniLearn Logo" /> OmniLearn
    </a>
    <div class="user-menu" id="user-menu">
      <span class="user-greeting">Hi <span id="user-name">User</span></span>
      <span class="user-icon" id="user-icon" tabindex="0" aria-label="User menu">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="8" r="4" fill="#4c6ddb"/>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="#4c6ddb"/>
        </svg>
      </span>
      <div class="profile-submenu" id="profile-submenu">
        <a href="#" id="edit-profile">Edit Profile</a>
        <a href="#" id="preferences">Preferences</a>
        <a href="#" id="logout">Logout</a>
      </div>
    </div>
  </div>
  <div class="course-details-container">
    <a href="index.html" class="back-btn">&larr; Back to Dashboard</a>
    <div id="course-content">
      <!-- Course details will be loaded here by JS -->
    </div>
  </div>
  <script type="module" src="course-details.js"></script>
  <script type="module" src="../user-management.js"></script>
</body>
</html>
