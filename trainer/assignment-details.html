<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Assignment Details - OmniLearn</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="trainer.css" />
  <style>
    .assignment-details-container {
      max-width: 900px;
      margin: 100px auto 40px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(76,109,219,0.10);
      padding: 40px 32px;
      font-family: 'Montserrat', Arial, sans-serif;
    }
    .assignment-header {
      border-bottom: 2px solid #e6eefd;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .assignment-title {
      color: #4c6ddb;
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .assignment-description {
      color: #263a7a;
      font-size: 1.1rem;
      line-height: 1.6;
    }
    .assignment-meta {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      color: #7ebe91;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }
    .meta-item {
      background: #f7f9fb;
      padding: 8px 12px;
      border-radius: 6px;
    }
    .instructions-section {
      margin-bottom: 30px;
    }
    .instructions-section h2 {
      color: #4c6ddb;
      margin-bottom: 15px;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .instructions-content {
      background: #f7f9fb;
      border-radius: 12px;
      padding: 20px;
      border-left: 4px solid #7ebe91;
      line-height: 1.6;
      color: #263a7a;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(76, 109, 219, 0.08);
    }
    .instructions-content h1,
    .instructions-content h2,
    .instructions-content h3,
    .instructions-content h4,
    .instructions-content h5,
    .instructions-content h6 {
      color: #4c6ddb;
      margin: 16px 0 8px 0;
      font-weight: 600;
    }
    .instructions-content h1 { font-size: 1.5rem; }
    .instructions-content h2 { font-size: 1.3rem; }
    .instructions-content h3 { font-size: 1.1rem; }
    .instructions-content p {
      margin: 12px 0;
      line-height: 1.7;
    }
    .instructions-content ul,
    .instructions-content ol {
      margin: 12px 0;
      padding-left: 24px;
    }
    .instructions-content li {
      margin: 6px 0;
      line-height: 1.6;
    }
    .instructions-content strong {
      color: #4c6ddb;
      font-weight: 600;
    }
    .instructions-content em {
      color: #7ebe91;
      font-style: italic;
    }
    .instructions-content blockquote {
      border-left: 4px solid #4c6ddb;
      padding-left: 16px;
      margin: 16px 0;
      font-style: italic;
      color: #6c757d;
      background: #fff;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
    }
    .instructions-content code {
      background: #e6eefd;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 0.9rem;
      color: #4c6ddb;
    }
    .instructions-content pre {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid #e6eefd;
      margin: 16px 0;
    }
    .instructions-content pre code {
      background: none;
      padding: 0;
      color: #263a7a;
    }
    .files-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #e6eefd;
    }
    .files-section h2 {
      color: #4c6ddb;
      margin-bottom: 15px;
      font-size: 1.5rem;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #f7f9fb;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .file-icon {
      color: #4c6ddb;
      font-size: 1.2rem;
    }
    .file-link {
      color: #4c6ddb;
      text-decoration: none;
      font-weight: 500;
    }
    .file-link:hover {
      color: #7ebe91;
    }
    .back-link {
      color: #4c6ddb;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 18px;
      display: inline-block;
    }
    .back-link:hover {
      color: #7ebe91;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .status-active {
      background: #d4edda;
      color: #155724;
    }
    .status-overdue {
      background: #f8d7da;
      color: #721c24;
    }
    .status-completed {
      background: #d1ecf1;
      color: #0c5460;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Back to Dashboard</a>
  <div class="assignment-details-container">
    <div id="assignment-content">
      <!-- Assignment content will be loaded here -->
    </div>
  </div>
  <script type="module" src="assignment-details.js"></script>
</body>
</html>
