<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Course Details - OmniLearn</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="trainer.css" />
  <style>
    .course-details-container {
      max-width: 900px;
      margin: 100px auto 40px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(76,109,219,0.10);
      padding: 40px 32px;
      font-family: 'Montserrat', Arial, sans-serif;
    }
    .course-header {
      border-bottom: 2px solid #e6eefd;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .course-title {
      color: #4c6ddb;
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .course-description {
      color: #263a7a;
      font-size: 1.1rem;
      line-height: 1.6;
    }
    .course-meta {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      color: #7ebe91;
      font-size: 0.95rem;
    }
    .outline-section {
      margin-bottom: 30px;
    }
    .outline-section h2 {
      color: #4c6ddb;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    .topic-item {
      background: #f7f9fb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border-left: 4px solid #4c6ddb;
    }
    .topic-title {
      color: #263a7a;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .topic-content {
      color: #263a7a;
      line-height: 1.6;
      margin-bottom: 15px;
    }
    .subtopic-item {
      background: #fff;
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0 10px 20px;
      border-left: 3px solid #7ebe91;
    }
    .subtopic-title {
      color: #4c6ddb;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtopic-content {
      color: #263a7a;
      line-height: 1.5;
    }
    .files-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #e6eefd;
    }
    .files-section h2 {
      color: #4c6ddb;
      margin-bottom: 15px;
      font-size: 1.5rem;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #f7f9fb;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .file-icon {
      color: #4c6ddb;
      font-size: 1.2rem;
    }
    .file-link {
      color: #4c6ddb;
      text-decoration: none;
      font-weight: 500;
    }
    .file-link:hover {
      color: #7ebe91;
    }
    .back-link {
      color: #4c6ddb;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 18px;
      display: inline-block;
    }
    .back-link:hover {
      color: #7ebe91;
    }
    .course-image {
      max-width: 100%;
      border-radius: 8px;
      margin: 15px 0;
    }
    .video-container {
      margin: 15px 0;
    }
    .video-container iframe {
      width: 100%;
      height: 400px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Back to Dashboard</a>
  <div class="course-details-container">
    <div id="course-content">
      <!-- Course content will be loaded here -->
    </div>
  </div>
  <script type="module" src="course-details.js"></script>
</body>
</html>
